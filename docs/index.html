<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="data-base" content="data">
  <title>전국 지자체 행정조직 현황</title>
  <meta name="description" content="전국 243개 지자체 행정기구 조직 현황 — 지자체별·키워드 검색·비교">
  <link rel="stylesheet" href="assets/app.css">
  <script type="module" src="assets/app.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body>
<div x-data="mainApp" x-init="init()" x-cloak>

  <!-- ── 헤더 ────────────────────────────────────────────── -->
  <header class="header">
    <a class="brand" href="#/" @click.prevent="navigate('/')">🏛 전국 지자체 행정조직</a>

    <nav class="header-nav">
      <a :class="{active: view==='overview' || view==='region'}"
         href="#/" @click.prevent="navigate('/')">지자체</a>
      <a :class="{active: view==='compare'}"
         href="#/compare" @click.prevent="navigate('/compare')">지자체 비교</a>
      <a :class="{active: view==='kwsearch'}"
         href="#/kwsearch" @click.prevent="navigate('/kwsearch')">키워드 검색</a>
    </nav>

    <div class="search-wrap" @click.outside="searchOpen=false">
      <input class="search-input" type="search" placeholder="지자체·기구명 검색…"
        x-model="searchQuery"
        @input.debounce.300ms="onSearch()"
        @focus="searchQuery && (searchOpen=true)"
        @keydown.escape="searchOpen=false">
      <div class="search-results" x-show="searchOpen && searchResults.length">
        <template x-for="r in searchResults" :key="r.id">
          <div class="search-item" @click="gotoResult(r)">
            <div class="search-main">
              <span class="search-region" x-text="r.region_name"></span>
              <template x-if="r.parent_name">
                <span class="search-sep"> › <span x-text="r.parent_name"></span></span>
              </template>
              <span class="search-sep"> › </span>
              <strong x-text="r.unit_name"></strong>
              <span class="type-badge" :class="'badge-'+r.unit_type" x-text="r.unit_type"></span>
            </div>
            <div class="search-excerpt" x-text="r.분장사무_summary?.slice(0,60)"></div>
          </div>
        </template>
      </div>
    </div>
  </header>

  <!-- ── 본문 ────────────────────────────────────────────── -->
  <main class="main">

    <!-- ════ 지자체 목록 (개요) ════ -->
    <div x-show="view==='overview'">
      <div class="stats-bar">
        <div class="stat"><span x-text="index.length"></span>개 지자체</div>
        <div class="stat"><span x-text="totalUnits.toLocaleString()"></span>개 행정기구</div>
        <div class="stat">국·실·본부 <span x-text="((aggregates?.['전국_기구유형별']?.['국']||0)+(aggregates?.['전국_기구유형별']?.['실']||0)+(aggregates?.['전국_기구유형별']?.['본부']||0)).toLocaleString()"></span>개</div>
        <div class="stat">직속기관 <span x-text="(aggregates?.['전국_기구유형별']?.['직속기관']||0).toLocaleString()"></span>개</div>
        <div class="stat">사업소 <span x-text="(aggregates?.['전국_기구유형별']?.['사업소']||0).toLocaleString()"></span>개</div>
        <div class="stat">광역정원 <span x-text="totalStaff.toLocaleString()"></span>명</div>
      </div>

      <!-- 광역별 섹션 -->
      <template x-for="gw in gwangyeok" :key="gw.code">
        <div class="gwangyeok-section">
          <!-- 광역 카드 -->
          <div class="gw-section-card" @click="navigate('/region/'+gw.code)">
            <div class="gw-section-name" x-text="gw.name.split(' ').slice(-1)[0]"></div>
            <div class="gw-section-meta">
              <span x-text="gw.기구수+'개 기구'"></span>
              <span x-show="gw.정원"> · <span x-text="gw.정원.toLocaleString()+'명'"></span></span>
            </div>
            <div class="kw-dots">
              <template x-for="kw in kwOrder" :key="kw">
                <span x-show="gw.키워드_분포?.[kw]" class="kw-dot" :class="'kw-'+kw"
                  :title="kw+' ('+gw.키워드_분포?.[kw]+')'"></span>
              </template>
            </div>
          </div>
          <!-- 기초 목록 -->
          <div class="gicheo-section">
            <template x-for="r in (gicheoByParent[gw.code]||[])" :key="r.code">
              <div class="gicheo-card" @click="navigate('/region/'+r.code)">
                <span class="gicheo-name" x-text="r.short_name"></span>
                <span class="gicheo-meta" x-text="r.기구수+'개'"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div><!-- /overview -->


    <!-- ════ 지자체 상세 트리 ════ -->
    <div x-show="view==='region'">
      <template x-if="!selectedRegion && !loading">
        <div class="empty-state">
          지자체를 선택하세요.
          <a href="#/" @click.prevent="navigate('/')">← 목록으로</a>
        </div>
      </template>

      <template x-if="selectedRegion">
        <div>
          <div class="region-header">
            <a class="back-link" href="#/" @click.prevent="navigate('/')">← 목록</a>
            <h2 x-text="selectedRegion.region.name"></h2>
            <span class="tag" x-text="selectedRegion.region.type"></span>
            <span class="tag" x-show="selectedRegion.totals?.정원_총">
              총정원 <strong x-text="(selectedRegion.totals?.정원_총||0).toLocaleString()+'명'"></strong>
            </span>
            <span class="tag-light" x-show="selectedRegion.totals?.정원_비고"
              x-text="selectedRegion.totals?.정원_비고"></span>
          </div>

          <!-- 산하 기초 (광역일 때) -->
          <template x-if="selectedRegion.region.level==='광역' && childRegions.length">
            <div>
              <div class="section-title">산하 기초자치단체 (<span x-text="childRegions.length"></span>)</div>
              <div class="gicheo-grid">
                <template x-for="r in childRegions" :key="r.code">
                  <div class="gicheo-card" @click="navigate('/region/'+r.code)">
                    <span class="gicheo-name" x-text="r.short_name"></span>
                    <span class="gicheo-meta" x-text="r.기구수+'개'"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- 조직 트리 + 상세 패널 -->
          <div class="tree-layout">
            <div class="tree-panel">
              <template x-for="unit in selectedRegion.structure" :key="unit.id">
                <div class="tree-item">
                  <div class="tree-row"
                    :class="{selected: selectedUnit?.id===unit.id, ['tree-type-'+unit.type]: true}"
                    @click="selectUnit(unit, null)">
                    <span class="tree-toggle" x-show="unit.children?.length"
                      @click.stop="unit._open=!unit._open">
                      <span x-text="unit._open?'▾':'▸'"></span>
                    </span>
                    <span class="tree-toggle-placeholder" x-show="!unit.children?.length"></span>
                    <span class="type-badge" :class="'badge-'+unit.type" x-text="unit.type"></span>
                    <span class="unit-name"
                      :class="{bold: ['국','실','본부','단'].includes(unit.type)}"
                      x-text="unit.name"></span>
                    <span class="child-count" x-show="unit.children?.length"
                      x-text="unit.children.length"></span>
                  </div>
                  <div x-show="unit._open">
                    <template x-for="child in unit.children" :key="child.id">
                      <div class="tree-row child-row"
                        :class="{selected: selectedUnit?.id===child.id}"
                        @click="selectUnit(child, unit)">
                        <span class="child-indent">└</span>
                        <span class="type-badge" :class="'badge-'+child.type" x-text="child.type"></span>
                        <span class="unit-name" x-text="child.name"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- 상세 패널 -->
            <div class="detail-panel" :class="{visible: !!selectedUnit}">
              <template x-if="selectedUnit">
                <div>
                  <div class="detail-title">
                    <span class="type-badge lg" :class="'badge-'+selectedUnit.type"
                      x-text="selectedUnit.type"></span>
                    <h3 x-text="selectedUnit.name"></h3>
                  </div>
                  <div class="detail-meta">
                    <template x-if="selectedParentUnit">
                      <span class="meta-item">소속: <strong x-text="selectedParentUnit.name"></strong></span>
                    </template>
                    <template x-if="selectedUnit.head_position">
                      <span class="meta-item">장: <span x-text="selectedUnit.head_position"></span></span>
                    </template>
                    <template x-if="selectedUnit.head_grade">
                      <span class="meta-item">직급: <span x-text="selectedUnit.head_grade"></span></span>
                    </template>
                    <template x-if="selectedUnit.근거조문">
                      <span class="meta-item">근거: <span x-text="selectedUnit.근거조문"></span></span>
                    </template>
                  </div>
                  <div class="detail-kws" x-show="selectedUnit.키워드_태그?.length">
                    <template x-for="kw in (selectedUnit.키워드_태그||[])" :key="kw">
                      <span class="kw-chip" :class="'kw-'+kw" x-text="kw"></span>
                    </template>
                  </div>
                  <template x-if="selectedUnit.분장사무_항목?.length">
                    <div class="detail-duties">
                      <div class="duties-label">소관사무</div>
                      <ol>
                        <template x-for="(item, i) in selectedUnit.분장사무_항목" :key="i">
                          <li x-text="item"></li>
                        </template>
                      </ol>
                    </div>
                  </template>
                  <template x-if="!selectedUnit.분장사무_항목?.length && selectedUnit.분장사무_원문">
                    <div class="detail-duties">
                      <div class="duties-label">소관사무 (원문)</div>
                      <p class="raw-text"
                        x-text="selectedUnit.분장사무_원문.slice(0,800)+(selectedUnit.분장사무_원문.length>800?'…':'')">
                      </p>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="!selectedUnit">
                <div class="detail-empty">← 기구를 클릭하면 상세 정보가 표시됩니다</div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div><!-- /region -->


    <!-- ════ 지자체 비교 ════ -->
    <div x-show="view==='compare'" class="compare-view">
      <h2>지자체 비교</h2>

      <div class="compare-filters">
        <span class="filter-label">기구유형:</span>
        <template x-for="t in typeOrder" :key="t">
          <label class="check-label">
            <input type="checkbox" :value="t" x-model="compareTypes">
            <span class="type-badge" :class="'badge-'+t" x-text="t"></span>
          </label>
        </template>
      </div>

      <div class="compare-hint">광역명 클릭 시 해당 광역의 기초자치단체가 펼쳐집니다.</div>

      <div class="table-wrap">
        <table class="data-table compare-table">
          <thead>
            <tr>
              <th>지자체</th>
              <th>정원</th>
              <template x-for="t in compareTypes" :key="t">
                <th x-text="t"></th>
              </template>
              <th>전체</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="gw in (aggregates?.광역||[])" :key="gw.code">
              <!-- 광역 행 -->
              <tr class="gw-compare-row" @click="toggleCompare(gw.code)">
                <td class="gw-compare-name">
                  <span class="expand-icon" x-text="compareExpanded[gw.code] ? '▾ ' : '▸ '"></span>
                  <span x-text="gw.name"></span>
                </td>
                <td x-text="gw.정원 ? gw.정원.toLocaleString() : '—'"></td>
                <template x-for="t in compareTypes" :key="t">
                  <td x-text="gw.기구유형별?.[t]||0"></td>
                </template>
                <td x-text="gwTypeTotal(gw.기구유형별)"></td>
              </tr>
              <!-- 기초 행 (아코디언) -->
              <template x-if="compareExpanded[gw.code]">
                <template x-for="r in (gicheoByParent[gw.code]||[])" :key="r.code">
                  <tr class="gi-compare-row clickable" @click="navigate('/region/'+r.code)">
                    <td class="gi-compare-name">
                      <span class="indent-mark">└ </span>
                      <span x-text="r.short_name"></span>
                    </td>
                    <td x-text="r.정원 ? r.정원.toLocaleString() : '—'"></td>
                    <template x-for="t in compareTypes" :key="t">
                      <td x-text="r.기구유형별?.[t]||0"></td>
                    </template>
                    <td x-text="gwTypeTotal(r.기구유형별)"></td>
                  </tr>
                </template>
              </template>
            </template>
          </tbody>
        </table>
      </div>
    </div><!-- /compare -->


    <!-- ════ 키워드 검색 ════ -->
    <div x-show="view==='kwsearch'" class="kwsearch-view">
      <h2>키워드 검색</h2>

      <div class="kwsearch-form">
        <input class="kwsearch-input" type="text"
          placeholder="검색어 입력 (AND / OR / NOT 조합 가능)"
          x-model="kwSearch"
          @keydown.enter="runKwSearch()">
        <button class="kwsearch-btn" @click="runKwSearch()">검색</button>
      </div>
      <div class="kwsearch-hint">
        예: <code>기후</code> · <code>기후 AND 탄소</code> · <code>복지 OR 보건</code> · <code>환경 NOT 연구</code>
        · AND/OR/NOT은 대소문자 무관
      </div>

      <!-- 검색 결과 -->
      <template x-if="kwSearchDone">
        <div class="kwsearch-results">
          <template x-for="(row, ri) in kwSearchRows" :key="row.region.code">
            <div>
              <!-- 광역 구분 헤더 -->
              <div x-show="row.kind === 'gw'" class="kwsearch-gwheader"
                @click="navigate('/region/'+row.region.code)">
                <span class="kwsearch-gwname" x-text="row.region.name"></span>
                <span class="kwsearch-gwmeta" x-show="row.groups.length">
                  <span x-text="row.groups.length"></span>개 기구 매칭
                </span>
              </div>

              <!-- 기초 행 -->
              <div x-show="row.kind === 'gi'" class="kwsearch-row">
                <div class="kwsearch-region" @click="navigate('/region/'+row.region.code)"
                  x-text="row.region.short_name"></div>
                <div class="kwsearch-matches">
                  <template x-if="row.groups.length === 0">
                    <span class="kwsearch-empty">—</span>
                  </template>
                  <template x-for="(mg, mgi) in row.groups" :key="mgi">
                    <div class="kwsearch-group">
                      <span class="kwsearch-unit" :class="{hit: mg.parentHit}"
                        x-text="mg.parentName"></span>
                      <template x-for="(c, ci) in mg.children" :key="ci">
                        <span class="kwsearch-child" :class="{hit: c.hit}">
                          <span class="kws-sep">›</span>
                          <span x-text="c.name"></span>
                        </span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>

              <!-- 광역 자체 결과 (광역 행 아래에 인라인 표시) -->
              <div x-show="row.kind === 'gw' && row.groups.length" class="kwsearch-row gw-result-row">
                <div class="kwsearch-region gw-self" @click="navigate('/region/'+row.region.code)">
                  <span x-text="row.region.name.split(' ').slice(-1)[0]"></span>
                  <span class="level-badge">광역</span>
                </div>
                <div class="kwsearch-matches">
                  <template x-for="(mg, mgi) in row.groups" :key="mgi">
                    <div class="kwsearch-group">
                      <span class="kwsearch-unit" :class="{hit: mg.parentHit}"
                        x-text="mg.parentName"></span>
                      <template x-for="(c, ci) in mg.children" :key="ci">
                        <span class="kwsearch-child" :class="{hit: c.hit}">
                          <span class="kws-sep">›</span>
                          <span x-text="c.name"></span>
                        </span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template x-if="!kwSearchDone">
        <div class="kwsearch-placeholder">
          검색어를 입력하고 엔터 또는 검색 버튼을 누르세요.<br>
          전국 243개 지자체를 일괄 검색합니다.
        </div>
      </template>
    </div><!-- /kwsearch -->

  </main>

  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" x-show="loading" x-cloak>
    <div class="spinner"></div>
  </div>

</div>
</body>
</html>
